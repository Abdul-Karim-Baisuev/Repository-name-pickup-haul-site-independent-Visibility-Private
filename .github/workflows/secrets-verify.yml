name: Verify rotated secrets

# Runs `npm run secrets:verify` against the live backend.
#
# Two entry points:
#
#  1. workflow_dispatch (manual)
#     - Operator triggers this from the Actions tab right after rotating
#       a credential. The job runs inside the `production-secrets`
#       environment, which MUST be configured with required reviewers
#       (Settings → Environments → production-secrets → Required reviewers)
#       so a second admin approves before the protected secrets are exposed.
#
#  2. pull_request (automatic, blocking)
#     - Runs only when the rotation tooling itself changes
#       (scripts/rotate-secrets.mjs, scripts/verify-rotation.mjs,
#       this workflow file, package.json). Uses the lower-privilege
#       `ci-readonly` environment so PRs from forks / new contributors
#       still gate on a human approval before touching secrets.
#     - Marked `required` via Branch Protection so a failing verify
#       blocks merging into main.

on:
  workflow_dispatch:
    inputs:
      checks:
        description: "Subset of checks to run (space-separated). Empty = all."
        required: false
        default: ""
        type: string

  pull_request:
    branches: [main]
    paths:
      - "scripts/rotate-secrets.mjs"
      - "scripts/verify-rotation.mjs"
      - ".github/workflows/secrets-verify.yml"
      - "package.json"
      - "package-lock.json"

concurrency:
  # Never run two verifications at once — they hit the same edge functions
  # and can pollute telegram_send_logs / consume rate budget.
  group: secrets-verify-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: secrets:verify
    runs-on: ubuntu-latest

    # Pick the right environment based on trigger:
    #   - manual dispatch → production-secrets (gated by reviewers, holds the live JWT)
    #   - PR              → ci-readonly       (gated by reviewers, may hold a scoped JWT)
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'production-secrets' || 'ci-readonly' }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install npm dependencies
        run: npm ci

      - name: Sanity-check required secrets
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          missing=0
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Environment is missing SUPABASE_SERVICE_ROLE_KEY"
            missing=1
          fi
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Environment is missing SUPABASE_ACCESS_TOKEN (needed by 'supabase db execute')"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Configure these in Settings → Environments → ${{ github.event_name == 'workflow_dispatch' && 'production-secrets' || 'ci-readonly' }}." >&2
            exit 1
          fi

      - name: Run secrets:verify
        id: verify
        env:
          SUPABASE_PROJECT_REF: ijalhgtxtenktmjipyxw
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          # ADMIN_JWT is optional. Provide it as an environment secret if you
          # want the telegram + lovable end-to-end checks to run; without it
          # the script reports those as skipped (non-fatal for `supabase`/`vault`).
          ADMIN_JWT: ${{ secrets.ADMIN_JWT }}
        run: |
          set -o pipefail
          # Only run the read-only checks on PRs — never spend Telegram quota
          # or write to telegram_send_logs from a PR build.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            checks="supabase vault"
          else
            checks="${{ github.event.inputs.checks }}"
          fi
          echo "Running checks: ${checks:-<all>}"
          npm run secrets:verify -- $checks | tee verify.log

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-verify-log
          path: verify.log
          retention-days: 30

      - name: Fail-loud summary
        if: failure()
        run: |
          echo "::error::secrets:verify failed — do NOT merge / do NOT mark the rotation as complete."
          echo "See the uploaded 'secrets-verify-log' artifact for details."

      # ----------------------------------------------------------------
      # Slack notification (success + failure).
      #
      # Requires SLACK_WEBHOOK_URL to be configured in the same GitHub
      # Environment as the rest of the secrets (production-secrets /
      # ci-readonly). If the webhook is not set, this step is skipped
      # silently — Slack notifications are best-effort and must NOT
      # block the gate.
      #
      # We post a compact summary plus a snippet of verify.log (Slack's
      # message limit is ~40k chars, so we tail the last ~3.5k). The
      # full log remains available as the uploaded artifact, linked via
      # the workflow run URL in the message.
      # ----------------------------------------------------------------
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured for this environment — skipping Slack notification."
            exit 0
          fi

          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            HEADLINE="secrets:verify passed"
            COLOR="#2eb886"
          else
            EMOJI=":rotating_light:"
            HEADLINE="secrets:verify FAILED — do NOT merge / do NOT mark rotation complete"
            COLOR="#c0392b"
          fi

          # Parse verify.log into a structured per-step list and a tail snippet.
          # verify-rotation.mjs prints each check as: "✓ name — detail" or "✖ name — detail".
          # We extract those lines and turn them into a Slack-friendly bullet list, then
          # append the Summary line and a tail of the raw log for context.
          if [ -f verify.log ]; then
            # Per-step bullets, max 20 to keep the message compact.
            STEPS=$(grep -E '^(✓|✖) ' verify.log \
              | sed -E 's/^✓ /:white_check_mark: /; s/^✖ /:x: /; s/ — / — /' \
              | sed -E 's/^(:[a-z_]+:) (.+)$/• \1 *\2/; s/ — /* — /' \
              | head -n 20)
            if [ -z "$STEPS" ]; then
              STEPS="_(no per-step results parsed from verify.log — see tail below)_"
            fi
            SUMMARY_LINE=$(grep -E '^Summary:' verify.log | tail -n 1)
            [ -z "$SUMMARY_LINE" ] && SUMMARY_LINE="(summary line not found)"
            # Tail the log to stay well under Slack's 40k char message limit.
            LOG_SNIPPET=$(tail -c 3000 verify.log)
          else
            STEPS="_(verify.log was not produced — the verify step likely failed before writing output)_"
            SUMMARY_LINE="(no summary — verify.log missing)"
            LOG_SNIPPET="(verify.log was not produced — the verify step likely failed before writing output)"
          fi

          # Build payload via jq so newlines / quotes are escaped safely.
          PAYLOAD=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg headline "$HEADLINE" \
            --arg color "$COLOR" \
            --arg trigger "$TRIGGER" \
            --arg actor "$ACTOR" \
            --arg ref "$REF" \
            --arg status "$JOB_STATUS" \
            --arg run_url "$RUN_URL" \
            --arg steps "$STEPS" \
            --arg summary "$SUMMARY_LINE" \
            --arg log "$LOG_SNIPPET" \
            '{
              text: ($emoji + " " + $headline),
              attachments: [{
                color: $color,
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ($headline | .[0:150]), emoji: true }
                  },
                  {
                    type: "section",
                    fields: [
                      { type: "mrkdwn", text: ("*Status:*\n" + $status) },
                      { type: "mrkdwn", text: ("*Trigger:*\n" + $trigger) },
                      { type: "mrkdwn", text: ("*Actor:*\n" + $actor) },
                      { type: "mrkdwn", text: ("*Ref:*\n" + $ref) }
                    ]
                  },
                  { type: "divider" },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: ("*Verification steps:*\n" + $steps) }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":bar_chart: " + $summary) }
                    ]
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: ("*Workflow run:* <" + $run_url + "|open in GitHub Actions>\nFull log is attached to the run as artifact `secrets-verify-log`.") }
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: ("*verify.log (tail):*\n```" + $log + "```") }
                  }
                ]
              }]
            }')

          # Use --fail so a non-2xx response from Slack surfaces in the job log,
          # but do not let it fail the whole job (notification is best-effort).
          curl -sS --fail -X POST \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification failed to deliver (webhook returned non-2xx)."
