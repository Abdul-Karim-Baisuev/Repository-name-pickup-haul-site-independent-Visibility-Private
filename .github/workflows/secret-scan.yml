name: Security — Secret scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks (block secrets in commits)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
      security-events: write

    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          # Full history is required so gitleaks can scan all commits
          # introduced by a PR, not just the merge commit.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use the repo-local config (stricter rules + project-specific allowlist).
          GITLEAKS_CONFIG: .gitleaks.toml
          # Fail the job (and therefore block the PR via required check) if any
          # secret is detected. This is the default but we set it explicitly.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
